########################################
# Redis TLS 설정 (BullMQ 포함 클라이언트는 TLS로 접속)
########################################

# 평문 포트 비활성화
port 0

# TLS 포트 활성화
tls-port 6379

# 인증서 경로 (docker-compose에서 /etc/redis/ssl로 마운트)
tls-cert-file /etc/redis/ssl/redis-cert.pem
tls-key-file /etc/redis/ssl/redis-key.pem
tls-ca-cert-file /etc/redis/ssl/redis-ca.pem

# 클라이언트 인증서(mTLS)는 요구하지 않음 (필요 시 yes로 변경)
tls-auth-clients no

# 일반 운영 권장값들
protected-mode yes
timeout 0
tcp-keepalive 300

# 데이터 저장 (필요 없으면 no로 변경 가능)
appendonly yes
dir /data

# 로그는 표준 출력으로
logfile ""

########################################
# 비밀번호(requirepass)는 redis-entrypoint.sh에서
# REDIS_PASSWORD가 있을 때만 동적으로 적용합니다.
########################################
